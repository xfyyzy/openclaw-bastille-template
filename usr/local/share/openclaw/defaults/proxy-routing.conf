# OpenClaw wrapper proxy routing policy (persistent).
#
# This file is sourced by /usr/local/bin/openclaw.
# Use shell assignment syntax and keep values space-delimited.
#
# Main switch precedence:
# - When the main template proxy switch USE_PROXY is not "yes", wrapper never
#   routes through proxychains and this file is ignored.

# Always direct (local/control) top-level commands.
# Note: `proxy_top_commands` takes precedence over this list. If you need a
# specific command to force proxy, add it to `proxy_top_commands`.
direct_top_commands='tui gateway daemon cron setup onboard init help --help -h version --version logs system approvals devices secrets acp config status health sessions security skills completion doctor dashboard reset uninstall'

# Always proxy top-level commands. Keep empty unless explicitly needed.
proxy_top_commands=''

# Route for unmatched commands: proxy|direct
default_route='proxy'

# Conditional subcommand routes.
gateway_proxy_subcommands='run'
setup_proxy_flags='--wizard --non-interactive --mode --remote-url --remote-token'
onboard_proxy_flags='--mode --remote-url --remote-token'
plugins_direct_subcommands='list info enable disable uninstall remove doctor'
plugins_proxy_subcommands='update upgrade search'
plugins_install_path_suffixes='.ts .js .mjs .cjs .tgz .tar.gz .tar .zip'
