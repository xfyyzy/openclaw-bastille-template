# Persistent HOME paths for tools that do not follow XDG by default.
#
# This file is sourced by /usr/local/libexec/openclaw/prepare-stateful-home.sh.
# Keep values space-delimited. Paths are relative to HOME and must not be absolute.
#
# Default persisted profiles:
# - /root           -> /var/db/openclaw/state/home/root
# - /var/db/openclaw -> /var/db/openclaw/state/home/openclaw

# Directory-style legacy paths.
legacy_home_dir_paths='.ssh .gnupg .kube .terraform.d .m2 .gradle .cargo .rustup .npm'

# File-style legacy paths.
legacy_home_file_paths='.gitconfig .fetchrc .sh_history'
